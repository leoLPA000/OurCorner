<!DOCTYPE html>
<html lang=es>

<head>
    <meta name=robots content="noindex, nofollow">
    <meta charset=UTF-8>
    <meta name=viewport content="width=device-width,initial-scale=1">
    <title>Para mi San Valentín</title>
    <style>
        *,
        ::after,
        ::before {
            padding: 0;
            margin: 0;
            box-sizing: border-box
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden
        }

        :root {
            --dark-color: #000000;
            --petal-color-light: #ff0a0a;
            --petal-color-dark: #800000;
            --leaf-color-main: #2a7221;
            --leaf-color-dark: #195113;
            --stem-color-light: #4caf50;
            --stem-color-dark: #388e3c;
            --stem-growth: 0;
            --leaf-growth: 0;
            --flower-growth: 0
        }

        body {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 100%;
            width: 100%;
            background-color: var(--dark-color);
            overflow: hidden;
            perspective: 1000px
        }

        .night {
            position: fixed;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            filter: blur(.1vmin);
            background: radial-gradient(ellipse at top, transparent 0, var(--dark-color)), radial-gradient(ellipse at bottom, var(--dark-color), rgba(145, 0, 0, .2)), repeating-linear-gradient(220deg, rgba(0, 0, 0, .5) 0, rgba(0, 0, 0, .5) 19px, transparent 19px, transparent 22px), linear-gradient(120deg, #2b0505, #5e0b15, #3d000a, #2b0505);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite
        }

        @keyframes gradientBG {
            0% {
                background-position: 0 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0 50%
            }
        }

        .flowers {
            position: relative;
            transform: scale(.9)
        }

        .flower {
            position: absolute;
            bottom: 10vmin;
            transform-origin: bottom center;
            z-index: 10;
            --fl-speed: 0.8s
        }

        .flower--1 {
            animation: moving-flower-1 4s linear infinite
        }

        .flower--1 .flower__line {
            height: 70vmin
        }

        .flower--2 {
            left: 50%;
            transform: rotate(20deg);
            animation: moving-flower-2 4s linear infinite
        }

        .flower--2 .flower__line {
            height: 60vmin
        }

        .flower--3 {
            left: 50%;
            transform: rotate(-15deg);
            animation: moving-flower-3 4s linear infinite
        }

        .flower--3 .flower__line {
            height: 55vmin
        }

        .flower__leafs {
            position: relative;
            transform: scale(var(--flower-growth));
            transform-origin: bottom center;
            transition: transform .2s ease-out
        }

        .flower__leafs::after {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            transform: translate(-50%, -100%);
            width: 8vmin;
            height: 8vmin;
            background-color: #f33;
            filter: blur(10vmin)
        }

        .flower__leaf {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 10vmin;
            height: 14vmin;
            border-radius: 50% 50% 50% 50%/60% 60% 40% 40%;
            background-image: linear-gradient(to top, var(--petal-color-dark), var(--petal-color-light));
            transform-origin: bottom center;
            box-shadow: inset 0 0 1vmin rgba(255, 255, 255, .3);
            transform: translateX(-50%)
        }

        .flower__leaf:first-child {
            transform: translateX(-50%) rotate(-5deg) translateY(-2vmin);
            z-index: 1
        }

        .flower__leaf:nth-child(2) {
            transform: translateX(-90%) rotate(-25deg) translateY(-1vmin) rotateY(30deg);
            z-index: 2
        }

        .flower__leaf:nth-child(3) {
            transform: translateX(-10%) rotate(25deg) translateY(-1vmin) rotateY(-30deg);
            z-index: 2
        }

        .flower__leaf:nth-child(4) {
            transform: translateX(-50%) rotate(-10deg) translateY(0) rotateY(20deg);
            z-index: 3;
            background-image: linear-gradient(to top, var(--petal-color-dark), #ff4d4d)
        }

        .flower__leaf:nth-child(5) {
            transform: translateX(-30%) rotate(10deg) translateY(0) rotateY(-20deg);
            z-index: 3
        }

        .flower__line {
            width: 1.5vmin;
            background-image: linear-gradient(to left, rgba(0, 0, 0, .2), transparent, rgba(255, 255, 255, .2)), linear-gradient(to top, transparent 10%, var(--stem-color-dark), var(--stem-color-light));
            box-shadow: inset 0 0 2px rgba(0, 0, 0, .5);
            height: calc(1% * var(--stem-growth));
            transition: height .2s ease-out
        }

        .flower__line__leaf {
            --w: 7vmin;
            --h: calc(var(--w) + 2vmin);
            position: absolute;
            top: 20%;
            left: 160%;
            width: var(--w);
            height: var(--h);
            border-radius: 40% 60% 30% 70%/70% 50% 50% 30%;
            background-image: linear-gradient(to top, var(--leaf-color-dark), var(--leaf-color-main));
            transition: transform .2s ease-out
        }

        .flower__line__leaf--1 {
            transform: rotate(70deg) rotateY(30deg) scale(var(--leaf-growth));
            transform-origin: left
        }

        .flower__line__leaf--2 {
            top: 45%;
            transform: rotate(70deg) rotateY(30deg) scale(var(--leaf-growth));
            transform-origin: left
        }

        .flower__line__leaf--3,
        .flower__line__leaf--4 {
            left: -560%;
            top: 12%;
            transform: rotate(-70deg) rotateY(30deg) scale(var(--leaf-growth));
            transform-origin: right
        }

        .flower__line__leaf--4 {
            top: 40%
        }

        .flower__light {
            position: absolute;
            bottom: 0;
            width: 1vmin;
            height: 1vmin;
            background-color: #fffb00;
            border-radius: 50%;
            filter: blur(.2vmin);
            animation: light-ans 4s linear infinite backwards
        }

        .flower__light:nth-child(odd) {
            background-color: #fcc
        }

        .flower__light--1 {
            left: -2vmin;
            animation-delay: 1s
        }

        .flower__light--2 {
            left: 3vmin;
            animation-delay: .5s
        }

        .flower__light--3 {
            left: -6vmin;
            animation-delay: .3s
        }

        .flower__light--4 {
            left: 6vmin;
            animation-delay: .9s
        }

        @keyframes light-ans {
            0% {
                opacity: 0;
                transform: translateY(0)
            }

            25% {
                opacity: 1;
                transform: translateY(-5vmin) translateX(-2vmin)
            }

            50% {
                opacity: 1;
                transform: translateY(-15vmin) translateX(2vmin);
                filter: blur(.2vmin)
            }

            75% {
                transform: translateY(-20vmin) translateX(-2vmin);
                filter: blur(.2vmin)
            }

            100% {
                transform: translateY(-30vmin);
                opacity: 0;
                filter: blur(1vmin)
            }
        }

        @keyframes moving-flower-1 {

            0%,
            100% {
                transform: rotate(2deg)
            }

            50% {
                transform: rotate(-2deg)
            }
        }

        @keyframes moving-flower-2 {

            0%,
            100% {
                transform: rotate(18deg)
            }

            50% {
                transform: rotate(14deg)
            }
        }

        @keyframes moving-flower-3 {

            0%,
            100% {
                transform: rotate(-18deg)
            }

            50% {
                transform: rotate(-20deg) rotateY(-10deg)
            }
        }

        .not-loaded * {
            animation-play-state: paused !important
        }

        .poem-card {
            position: absolute;
            top: 50%;
            right: 5vw;
            transform: translateY(-50%);
            width: 500px;
            max-width: 90vw;
            padding: 30px;
            background: linear-gradient(135deg, rgba(80, 20, 40, 0.85), rgba(40, 10, 20, 0.9));
            border-radius: 20px;
            border: 2px solid rgba(255, 100, 100, .5);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 50px rgba(255, 0, 100, 0.3), 0 0 30px rgba(255, 50, 50, 0.2);
            z-index: 20;
        }

        #poem-text {
            color: #fff0f5;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            line-height: 1.8;
            white-space: pre-wrap;
            text-align: center;
        }

        #poem-text::after {
            content: '|';
            margin-left: 5px;
            opacity: 1;
            animation: blink-caret .75s step-end infinite
        }

        @keyframes blink-caret {

            from,
            to {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        #poem-text.typing-done::after {
            animation: none;
            opacity: 0
        }

        .star {
            position: fixed;
            top: 0;
            left: 0;
            width: 2px;
            height: 2px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
            animation: twinkle 5s infinite
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: .5;
                transform: scale(.8)
            }

            50% {
                opacity: 1;
                transform: scale(1.2)
            }
        }

        .shooting-star {
            position: fixed;
            top: -40px;
            left: 50%;
            width: 2px;
            height: 2px;
            background-color: #fff;
            border-radius: 50%;
            animation: shoot 10s linear infinite;
            animation-delay: 3s
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 100px;
            height: 1px;
            background: linear-gradient(to left, #fff, transparent)
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0);
                opacity: 1
            }

            100% {
                transform: translate(100vw, 100vh);
                opacity: 0
            }
        }

        @media (max-width:1024px) {
            .poem-card {
                top: 3vh;
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: 85%;
                max-width: 450px;
                padding: 20px;
                max-height: 65vh;
                overflow-y: auto;
            }

            #poem-text {
                font-size: 1rem;
                line-height: 1.65;
            }

            .flowers {
                transform: scale(.65);
                bottom: -8vmin
            }
        }

        @media (max-width:768px) {
            .poem-card {
                top: 2vh;
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: 88vw;
                max-height: 60vh;
                padding: 18px;
            }

            #poem-text {
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .flowers {
                transform: scale(.6);
                bottom: -10vmin
            }
        }

        @media (max-width:480px) {
            .poem-card {
                top: 1.5vh;
                width: 92vw;
                max-height: 55vh;
                padding: 15px;
                border-radius: 15px;
            }

            #poem-text {
                font-size: 0.85rem;
                line-height: 1.5;
            }

            .flowers {
                transform: scale(.5);
                bottom: -12vmin;
            }

            .btn-libreta {
                top: 10px !important;
                left: 10px !important;
                width: 38px !important;
                height: 38px !important;
                font-size: 1.2rem !important;
            }
        }

        /* Botón para volver a la Libreta */
        .btn-libreta {
            position: fixed;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, rgba(80, 20, 40, 0.7), rgba(40, 10, 20, 0.8));
            color: #ffb3c1;
            border: 1.5px solid rgba(255, 100, 100, 0.4);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 30;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 50, 50, 0.2);
            backdrop-filter: blur(8px);
        }

        .btn-libreta:hover {
            background: linear-gradient(135deg, rgba(100, 30, 50, 0.85), rgba(60, 15, 30, 0.9));
            color: #ffc0cb;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 50, 50, 0.35);
            border-color: rgba(255, 100, 100, 0.6);
        }

        .btn-libreta:active {
            transform: translateY(0);
        }
    </style>

    <script>
        window.onload = () => {
            // Remover clase not-loaded después de 1 segundo
            setTimeout(() => {
                document.body.classList.remove("not-loaded");
            }, 1000);

            // El poema completo
            const poem = `En este día de San Valentín,
mi amor por ti no tiene fin.
Como una flor roja y brillante,
mi corazón late por ti a cada instante 🌹❤️
Rocío, eres mi sueño hecho realidad,
mi paz, mi alegría y mi felicidad.
Gracias por existir y por elegir caminar conmigo 🫂❤️
Te amo hoy, mañana y siempre, mi vida 🥹🥰😘
Mi esposita hermosa🥰❤️😘

💝 de Leonardo Para Rocío 💝`;

            const poemElement = document.getElementById("poem-text");
            const root = document.documentElement;
            let charIndex = 0;
            const flowerHeights = { "flower--1": 70, "flower--2": 60, "flower--3": 55 };

            // Función de escritura con efecto typewriter
            function typeWriter() {
                if (charIndex < poem.length) {
                    poemElement.innerHTML += poem.charAt(charIndex);
                    charIndex++;

                    // Calcular progreso para animaciones
                    const progress = charIndex / poem.length;
                    const stemProgress = progress;
                    const leafProgress = Math.max(0, (progress - 0.2) / 0.8);
                    const flowerProgress = Math.max(0, (progress - 0.5) / 0.5);

                    // Animar crecimiento de tallos
                    document.querySelectorAll(".flower").forEach(flower => {
                        const flowerHeight = flowerHeights[flower.classList[1]] * stemProgress;
                        flower.querySelector(".flower__line").style.height = flowerHeight + "vmin";
                    });

                    // Animar crecimiento de hojas y flores
                    root.style.setProperty("--leaf-growth", leafProgress.toFixed(2));
                    root.style.setProperty("--flower-growth", flowerProgress.toFixed(2));

                    setTimeout(typeWriter, 80);
                } else {
                    // Animación completada
                    poemElement.classList.add("typing-done");
                    root.style.setProperty("--leaf-growth", 1);
                    root.style.setProperty("--flower-growth", 1);

                    // Asegurar altura final de las flores
                    document.querySelectorAll(".flower").forEach(flower => {
                        const finalHeight = flowerHeights[flower.classList[1]];
                        flower.querySelector(".flower__line").style.height = finalHeight + "vmin";
                    });
                }
            }

            typeWriter();

            // Crear estrellas en el cielo
            const night = document.querySelector(".night");
            for (let i = 0; i < 100; i++) {
                const star = document.createElement("div");
                star.className = "star";
                star.style.left = Math.random() * 100 + "%";
                star.style.top = Math.random() * 100 + "%";
                star.style.animationDelay = Math.random() * 5 + "s";
                night.appendChild(star);
            }
        };
    </script>
